                        function ConsultAI() {
                            var input = $("#AiInput").val();

                            //TODO: a different way to send via POST that might work better
                            $.ajax({
                                url: "URL",
                                method: "POST",
                                contentType: "application/json",
                                data: JSON.stringify({ messages: conversation }),
                                success: function(result) {
                                    let aiText = result.response || result.text || result.message || result;
